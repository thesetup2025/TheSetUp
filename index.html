<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheSetUp · Sotogrande</title>
  <meta name="description" content="Creative experiences studio. Sotogrande.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ── HERO ─────────────────────────────────────────── */
    #hero {
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 5vw;
      position: relative;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 11vw, 14rem);
      font-weight: 400;
      letter-spacing: .14em;
      line-height: 1;
      opacity: 0;
      animation: fadeIn 2s .3s ease forwards;
    }

    .hero-rule {
      width: 44px;
      height: 1px;
      background: var(--tc);
      margin: 2.75rem auto;
      opacity: 0;
      animation: fadeIn 1s .9s ease forwards;
    }

    .hero-sub {
      font-size: .6rem;
      letter-spacing: .48em;
      text-transform: uppercase;
      color: rgba(245,240,232,.32);
      opacity: 0;
      animation: fadeIn 1s 1.25s ease forwards;
    }

    .scroll-cue {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      opacity: 0;
      animation: fadeIn .8s 2.2s ease forwards;
    }

    .scroll-cue-line {
      width: 1px;
      height: 44px;
      background: linear-gradient(to bottom, rgba(199,93,60,.45), transparent);
      animation: pulse 2.8s ease infinite;
    }

    /* ── DOORS ────────────────────────────────────────── */
    #doors { position: relative; z-index: 1; }

    .doors-intro {
      padding: 16vh 5vw 8vh;
      text-align: center;
    }

    .doors-eyebrow {
      font-size: .5rem;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(199,93,60,.45);
      display: block;
    }

    .doors-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: rgba(245,240,232,.035);
    }

    .door {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      display: block;
      text-decoration: none;
      background: var(--bg);
    }

    .door-img {
      position: absolute;
      inset: 0;
    }

    .door-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) brightness(.42);
      transition: filter .85s ease, transform .9s ease;
      display: block;
    }

    .door:hover .door-img img,
    .door:focus-visible .door-img img {
      filter: grayscale(18%) brightness(.68);
      transform: scale(1.04);
    }

    .door-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(1.4rem, 3vw, 2.4rem);
      background: linear-gradient(
        to top,
        rgba(13,13,13,.9) 0%,
        rgba(13,13,13,.28) 45%,
        transparent 72%
      );
    }

    .door-n {
      display: block;
      font-size: .46rem;
      letter-spacing: .38em;
      color: var(--tc);
      margin-bottom: .65rem;
    }

    .door-h {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.45rem, 3vw, 2.7rem);
      font-weight: 400;
      color: var(--fg);
      line-height: 1.05;
      letter-spacing: .04em;
    }

    .door-arrow {
      display: block;
      margin-top: .65rem;
      font-size: .48rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(199,93,60,.65);
      transform: translateX(-6px);
      opacity: 0;
      transition: opacity .4s ease, transform .4s ease;
    }

    .door:hover .door-arrow,
    .door:focus-visible .door-arrow { opacity: 1; transform: translateX(0); }

    .door:focus-visible {
      outline: 2px solid rgba(199,93,60,.55);
      outline-offset: -2px;
    }

    @media (max-width: 768px) {
      .doors-grid { grid-template-columns: 1fr; }
      .door { aspect-ratio: 16 / 9; }
    }

    @media (max-width: 480px) {
      .door { aspect-ratio: 3 / 2; }
      .doors-intro { padding: 12vh 5vw 6vh; }
    }
  </style>
</head>
<body>

<canvas id="cvs" aria-hidden="true"></canvas>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header>
  <a href="index.html" class="wordmark" id="wm" style="opacity:0" aria-label="TheSetUp — inicio">TheSetUp</a>
  <nav class="lang" aria-label="Language / Idioma">
    <button class="lang-btn on" data-lang="en" aria-label="Switch to English" aria-pressed="true">EN</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="es" aria-label="Cambiar a español" aria-pressed="false">ES</button>
  </nav>
</header>

<!-- ── HERO ────────────────────────────────────────────── -->
<section id="hero" aria-label="TheSetUp">
  <h1 class="hero-title">TheSetUp</h1>
  <div class="hero-rule" aria-hidden="true"></div>
  <p class="hero-sub"
     data-en="Experiences · Sotogrande"
     data-es="Experiencias · Sotogrande">Experiences · Sotogrande</p>
  <div class="scroll-cue" aria-hidden="true">
    <div class="scroll-cue-line"></div>
  </div>
</section>

<!-- ── DOORS ───────────────────────────────────────────── -->
<section id="doors" aria-label="Experiencias">
  <div class="doors-intro rv">
    <span class="doors-eyebrow"
          data-en="Choose your experience"
          data-es="Elige tu experiencia">Choose your experience</span>
  </div>

  <div class="doors-grid">

    <!-- 01 · Afterglow -->
    <a href="afterglow.html" class="door" aria-label="Afterglow">
      <div class="door-img">
        <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&h=600&fit=crop&q=80"
             alt="" role="presentation" loading="lazy">
      </div>
      <div class="door-overlay">
        <span class="door-n" aria-hidden="true">01</span>
        <h2 class="door-h">Afterglow</h2>
        <span class="door-arrow" aria-hidden="true">→</span>
      </div>
    </a>

    <!-- 02 · Corporativo -->
    <a href="corporativo.html" class="door" aria-label="Corporativo">
      <div class="door-img">
        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&h=600&fit=crop&q=80"
             alt="" role="presentation" loading="lazy">
      </div>
      <div class="door-overlay">
        <span class="door-n" aria-hidden="true">02</span>
        <h2 class="door-h"
            data-en="Corporate"
            data-es="Corporativo">Corporate</h2>
        <span class="door-arrow" aria-hidden="true">→</span>
      </div>
    </a>

    <!-- 03 · Pre bodas -->
    <a href="prebodas.html" class="door" aria-label="Pre bodas">
      <div class="door-img">
        <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=900&h=600&fit=crop&q=80"
             alt="" role="presentation" loading="lazy">
      </div>
      <div class="door-overlay">
        <span class="door-n" aria-hidden="true">03</span>
        <h2 class="door-h"
            data-en="Pre-wedding"
            data-es="Pre bodas">Pre-wedding</h2>
        <span class="door-arrow" aria-hidden="true">→</span>
      </div>
    </a>

    <!-- 04 · Daylight -->
    <a href="daylight.html" class="door" aria-label="Daylight">
      <div class="door-img">
        <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=900&h=600&fit=crop&q=80"
             alt="" role="presentation" loading="lazy">
      </div>
      <div class="door-overlay">
        <span class="door-n" aria-hidden="true">04</span>
        <h2 class="door-h">Daylight</h2>
        <span class="door-arrow" aria-hidden="true">→</span>
      </div>
    </a>

  </div>
</section>

<!-- ── SOTOGRANDE ──────────────────────────────────────── -->
<section id="sotogrande" aria-label="Sotogrande">
  <p class="soto-phrase rv"
     data-en="Where the different ones gather."
     data-es="Donde se reúnen los que buscan algo distinto.">
    Where the different ones gather.
  </p>
</section>

<!-- ── CONTACT ─────────────────────────────────────────── -->
<section id="contact">
  <h2 class="contact-h rv"
      data-en="Contact"
      data-es="Contacto">Contact</h2>

  <form class="cform rv d1" id="cform" novalidate aria-label="Contact form">
    <div class="fg">
      <label for="f-name" data-en="Name" data-es="Nombre">Name</label>
      <input type="text" id="f-name" name="name" autocomplete="name" required aria-required="true">
    </div>
    <div class="fg">
      <label for="f-email">Email</label>
      <input type="email" id="f-email" name="email" autocomplete="email" required aria-required="true">
    </div>
    <div class="fg">
      <label for="f-msg" data-en="Message" data-es="Mensaje">Message</label>
      <textarea id="f-msg" name="message" required aria-required="true"></textarea>
    </div>
    <button type="submit" class="send-btn"
            data-en="Send" data-es="Enviar">Send</button>
    <p id="form-msg" role="status" aria-live="polite"></p>
  </form>

  <div class="contact-info rv d2">
    <div class="ci">
      <span class="ci-label">Email</span>
      <span class="ci-val">hola@thesetup.es</span>
    </div>
    <div class="ci">
      <span class="ci-label" data-en="Phone" data-es="Teléfono">Phone</span>
      <span class="ci-val">+34 000 000 000</span>
    </div>
    <div class="ci">
      <span class="ci-label" data-en="Location" data-es="Sede">Location</span>
      <span class="ci-val">Sotogrande, Cádiz</span>
    </div>
  </div>
</section>

<!-- ── FOOTER ──────────────────────────────────────────── -->
<footer>
  <span class="ft-w">TheSetUp</span>
  <span class="ft-c">© 2025 · Sotogrande</span>
</footer>


<script>
'use strict';

/* ══════════════════════════════════════════════════
   LANGUAGE SYSTEM
══════════════════════════════════════════════════ */
const LANGS = ['en', 'es'];
const FMSGS = {
  ok:   { en: "Message sent. We'll be in touch.",  es: 'Mensaje enviado. Nos ponemos en contacto pronto.' },
  miss: { en: 'Please fill in all fields.',        es: 'Por favor, completa todos los campos.' }
};

let lang = localStorage.getItem('tsu-lang') || 'en';
if (!LANGS.includes(lang)) lang = 'en';

function applyLang(l) {
  lang = l;
  document.documentElement.lang = l;
  localStorage.setItem('tsu-lang', l);
  document.querySelectorAll('[data-en]').forEach(el => { el.textContent = el.dataset[l]; });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    const active = btn.dataset.lang === l;
    btn.classList.toggle('on', active);
    btn.setAttribute('aria-pressed', active.toString());
  });
}

applyLang(lang);

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

/* ══════════════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════════════ */
(function particles() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  const mob = window.innerWidth < 640;
  const N   = mob ? 24 : 72;
  const CD  = 100;
  let W, H, sp = 0, pmx = null, pmy = null;
  const pts = [];

  function resize() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize, { passive: true });
  document.addEventListener('mousemove', e => { pmx = e.clientX; pmy = e.clientY; }, { passive: true });

  for (let i = 0; i < N; i++) {
    const vx = (Math.random() - .5) * .22, vy = (Math.random() - .5) * .22;
    pts.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+.3,
               vx, vy, bvx: vx, bvy: vy, maxA: Math.random()*.35+.05, a: 0 });
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
      if (pmx !== null) {
        const dx = pmx - p.x, dy = pmy - p.y, d2 = dx*dx + dy*dy;
        if (d2 < 12100) { const f = (1 - Math.sqrt(d2)/110) * .0032; p.vx -= dx*f; p.vy -= dy*f; }
      }
      p.vx += (p.bvx - p.vx) * .04; p.vy += (p.bvy - p.vy) * .04;
      p.x  += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; else if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; else if (p.y > H) p.y = 0;
      const tgt = p.maxA * Math.max(.02, sp * 1.35);
      p.a += (Math.min(tgt, p.maxA) - p.a) * .02;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fillStyle = `rgba(199,93,60,${p.a})`; ctx.fill();
    }
    if (!mob) {
      for (let i = 0; i < pts.length; i++) {
        for (let j = i+1; j < pts.length; j++) {
          const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y, d = Math.sqrt(dx*dx+dy*dy);
          if (d < CD) {
            const a = (1 - d/CD) * .055 * sp;
            if (a < .003) continue;
            ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(199,93,60,${a})`; ctx.lineWidth = .4; ctx.stroke();
          }
        }
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
  window._pScroll = v => { sp = v; };
})();

/* ══════════════════════════════════════════════════
   SCROLL — progress, warmth, wordmark reveal
══════════════════════════════════════════════════ */
const wm   = document.getElementById('wm');
const hero = document.getElementById('hero');
let raf    = false;

function onScroll() {
  if (raf) return;
  raf = true;
  requestAnimationFrame(() => {
    const maxH = document.documentElement.scrollHeight - window.innerHeight;
    const prog = maxH > 0 ? Math.min(window.scrollY / maxH, 1) : 0;
    document.documentElement.style.setProperty('--s', prog);
    const w = Math.round(prog * 9);
    document.body.style.backgroundColor = `rgb(${13+w},${13+Math.round(w*.45)},13)`;
    if (window._pScroll) window._pScroll(prog);
    if (wm && hero) {
      const threshold = hero.offsetHeight * .72;
      wm.style.opacity = window.scrollY > threshold ? '1' : '0';
    }
    raf = false;
  });
}

window.addEventListener('scroll', onScroll, { passive: true });
onScroll();

/* ══════════════════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════════════════ */
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); } });
  }, { threshold: .1 });
  document.querySelectorAll('.rv').forEach(el => obs.observe(el));
} else {
  document.querySelectorAll('.rv').forEach(el => el.classList.add('on'));
}

/* ══════════════════════════════════════════════════
   FORM
══════════════════════════════════════════════════ */
const form = document.getElementById('cform');
const fmsg = document.getElementById('form-msg');

if (form && fmsg) {
  form.addEventListener('submit', e => {
    e.preventDefault();
    const filled = ['f-name','f-email','f-msg'].every(id => document.getElementById(id).value.trim().length > 0);
    const m = filled ? FMSGS.ok[lang] : FMSGS.miss[lang];
    fmsg.textContent = m;
    fmsg.style.opacity = '1';
    if (filled) form.reset();
    clearTimeout(form._t);
    form._t = setTimeout(() => { fmsg.style.opacity = '0'; }, 5500);
  });
}
</script>
</body>
</html>
