<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería · TheSetUp</title>
  <meta name="description" content="Galería de momentos. TheSetUp · Sotogrande.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ── GALERÍA · COMING SOON ────────────────────────── */
    .gallery-soon {
      min-height: 86vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12vh 5vw 10vh;
      position: relative;
      z-index: 1;
    }

    .gs-eyebrow {
      font-size: .5rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: rgba(199,93,60,.48);
      display: block;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 1s .5s ease forwards;
    }

    .gs-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 9vw, 10rem);
      font-weight: 400;
      letter-spacing: .06em;
      line-height: 1;
      opacity: 0;
      animation: fadeIn 1.4s .7s ease forwards;
    }

    .gs-rule {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, rgba(199,93,60,.5), transparent);
      margin: 3rem auto;
      opacity: 0;
      animation: fadeIn 1s 1.1s ease forwards;
    }

    .gs-soon {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 400;
      font-style: italic;
      color: rgba(245,240,232,.4);
      letter-spacing: .03em;
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeIn 1s 1.4s ease forwards;
    }

    .gs-label {
      display: block;
      margin-top: 3rem;
      font-size: .48rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(245,240,232,.12);
      opacity: 0;
      animation: fadeIn 1s 1.8s ease forwards;
    }

    /* ── PLACEHOLDER GRID (listo para fotos) ─────────── */
    /*
     * Cuando añadas fotos, descomenta esta sección y elimina
     * el bloque .gallery-soon, o ponlos en el orden que prefieras.
     *
     * Uso: añade <article class="gallery-item"> con una <img> dentro.
     *
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: rgba(245,240,232,.03);
      padding: 0;
    }

    .gallery-item {
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--bg);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) brightness(.55);
      transition: filter .7s ease, transform .7s ease;
      display: block;
    }

    .gallery-item:hover img {
      filter: grayscale(20%) brightness(.75);
      transform: scale(1.03);
    }

    @media (max-width: 900px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 540px) {
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-item { aspect-ratio: 3 / 2; }
    }
    */
  </style>
</head>
<body>

<canvas id="cvs" aria-hidden="true"></canvas>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header>
  <a href="index.html" class="wordmark" style="opacity:1" aria-label="TheSetUp — volver al inicio">TheSetUp</a>
  <nav class="lang" aria-label="Language / Idioma">
    <button class="lang-btn on" data-lang="en" aria-label="Switch to English" aria-pressed="true">EN</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="es" aria-label="Cambiar a español" aria-pressed="false">ES</button>
  </nav>
</header>

<!-- ── COMING SOON ─────────────────────────────────────── -->
<section class="gallery-soon" aria-label="Galería">

  <span class="gs-eyebrow"
        data-en="Gallery"
        data-es="Galería">Gallery</span>

  <h1 class="gs-title"
      data-en="Moments"
      data-es="Momentos">Moments</h1>

  <div class="gs-rule" aria-hidden="true"></div>

  <p class="gs-soon"
     data-en="Soon, the moments we've created."
     data-es="Pronto, los momentos que hemos creado.">Soon, the moments we've created.</p>

  <span class="gs-label"
        data-en="Coming soon"
        data-es="Próximamente">Coming soon</span>

</section>

<!--
  ── GALERÍA DE FOTOS (descomenta cuando tengas imágenes) ──────

  <section class="gallery-grid" aria-label="Galería de fotos">

    <article class="gallery-item">
      <img src="ruta/a/tu/foto.jpg" alt="Descripción del momento" loading="lazy">
    </article>

    <article class="gallery-item">
      <img src="ruta/a/tu/foto.jpg" alt="Descripción del momento" loading="lazy">
    </article>

    ...añade tantos <article class="gallery-item"> como necesites...

  </section>
-->

<!-- ── CONTACT CTA ──────────────────────────────────────── -->
<section class="contact-cta" aria-label="Contacto">
  <span class="cta-eyebrow rv"
        data-en="Want to be part of it?"
        data-es="¿Quieres formar parte?">Want to be part of it?</span>
  <p class="cta-h rv d1"
     data-en="Let's create something worth remembering."
     data-es="Creemos algo que valga la pena recordar.">Let's create something worth remembering.</p>
  <a href="index.html#contact" class="cta-btn rv d2"
     data-en="Get in touch"
     data-es="Escríbenos">Get in touch</a>
</section>

<!-- ── FOOTER ──────────────────────────────────────────── -->
<footer>
  <a href="index.html" class="ft-w" style="text-decoration:none">TheSetUp</a>
  <span class="ft-c">© 2025 · Sotogrande</span>
</footer>


<script>
'use strict';

/* ══ LANGUAGE ══════════════════════════════════════════ */
const LANGS = ['en', 'es'];
let lang = localStorage.getItem('tsu-lang') || 'en';
if (!LANGS.includes(lang)) lang = 'en';

function applyLang(l) {
  lang = l;
  document.documentElement.lang = l;
  localStorage.setItem('tsu-lang', l);
  document.querySelectorAll('[data-en]').forEach(el => { el.textContent = el.dataset[l]; });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    const active = btn.dataset.lang === l;
    btn.classList.toggle('on', active);
    btn.setAttribute('aria-pressed', active.toString());
  });
}

applyLang(lang);
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

/* ══ PARTICLES ══════════════════════════════════════════ */
(function particles() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  const mob = window.innerWidth < 640;
  const N = mob ? 20 : 55;
  const CD = 100;
  let W, H, sp = 0, pmx = null, pmy = null;
  const pts = [];

  function resize() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize, { passive: true });
  document.addEventListener('mousemove', e => { pmx = e.clientX; pmy = e.clientY; }, { passive: true });

  for (let i = 0; i < N; i++) {
    const vx = (Math.random()-.5)*.22, vy = (Math.random()-.5)*.22;
    pts.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+.3,
               vx, vy, bvx: vx, bvy: vy, maxA: Math.random()*.35+.05, a: 0 });
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
      if (pmx !== null) {
        const dx=pmx-p.x, dy=pmy-p.y, d2=dx*dx+dy*dy;
        if (d2<12100) { const f=(1-Math.sqrt(d2)/110)*.0032; p.vx-=dx*f; p.vy-=dy*f; }
      }
      p.vx+=(p.bvx-p.vx)*.04; p.vy+=(p.bvy-p.vy)*.04;
      p.x+=p.vx; p.y+=p.vy;
      if (p.x<0) p.x=W; else if (p.x>W) p.x=0;
      if (p.y<0) p.y=H; else if (p.y>H) p.y=0;
      const tgt = p.maxA * Math.max(.06, sp*1.5);
      p.a += (Math.min(tgt,p.maxA)-p.a)*.02;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fillStyle = `rgba(199,93,60,${p.a})`; ctx.fill();
    }
    if (!mob) for (let i=0; i<pts.length; i++) for (let j=i+1; j<pts.length; j++) {
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if (d<CD) {
        const a=(1-d/CD)*.06*sp; if (a<.003) continue;
        ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(199,93,60,${a})`; ctx.lineWidth=.4; ctx.stroke();
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
  window._pScroll = v => { sp = v; };
})();

/* ══ SCROLL ════════════════════════════════════════════ */
let raf = false;
function onScroll() {
  if (raf) return; raf = true;
  requestAnimationFrame(() => {
    const maxH = document.documentElement.scrollHeight - window.innerHeight;
    const prog = maxH > 0 ? Math.min(window.scrollY/maxH, 1) : 0;
    document.documentElement.style.setProperty('--s', prog);
    const w = Math.round(prog*9);
    document.body.style.backgroundColor = `rgb(${13+w},${13+Math.round(w*.45)},13)`;
    if (window._pScroll) window._pScroll(prog);
    raf = false;
  });
}
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();

/* ══ SCROLL REVEAL ════════════════════════════════════ */
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); } });
  }, { threshold: .1 });
  document.querySelectorAll('.rv').forEach(el => obs.observe(el));
} else {
  document.querySelectorAll('.rv').forEach(el => el.classList.add('on'));
}
</script>
</body>
</html>
